name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Syntax check JavaScript
        run: |
          for f in utils.js core.js church.js app.js; do
            cp "$f" "/tmp/$(basename "$f" .js).mjs"
            node --check "/tmp/$(basename "$f" .js).mjs"
          done
          node --check data.js
          node --check blog/blog.js

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Pages 소스가 "branch" 방식이어도 자동으로 GitHub Actions 방식으로 전환
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
